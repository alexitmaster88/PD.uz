version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm config set store-dir ~/.pnpm-store
        - pnpm install --frozen-lockfile=false
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - ~/.pnpm-store/**/*