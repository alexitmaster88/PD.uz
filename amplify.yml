version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm config set store-dir ~/.pnpm-store
        - pnpm config set ignore-scripts false
        - pnpm install --frozen-lockfile=false
        - pnpm rebuild sharp || true
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - ~/.pnpm-store/**/*
pnpm:
  node-linker: hoisted
  shamefully-hoist: true
  strict-peer-dependencies: false
scripts:
  build: next build
  dev: next dev
  start: next start
