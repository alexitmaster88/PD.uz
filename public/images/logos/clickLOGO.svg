<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200">
  <!-- Blue squircle outer shape -->
  <rect x="0" y="10" width="180" height="180" rx="52" ry="52" fill="#0066FF"/>
  <!-- White inner squircle cutout -->
  <rect x="38" y="38" width="104" height="104" rx="32" ry="32" fill="white"/>
  <!-- Blue inner-inner dot (hole center) -->
  <rect x="68" y="68" width="44" height="44" rx="14" ry="14" fill="#0066FF"/>
  <!-- "click" text -->
  <text x="204" y="156" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="128" fill="#0a0a0a" letter-spacing="-2">click</text>
</svg>
